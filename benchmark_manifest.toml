version = 1

# Large assets and ground truth belong here. The benchmark runner keeps suite
# definitions and synthetic generators in inlier-benchmarks.

[[dataset]]
id = "fundamental/phototourism-val"
archive = "phototourism-ransac-val-v1.tar.zst"
files = [
  "sacre_coeur/matches.h5",
  "sacre_coeur/match_conf.h5",
  "sacre_coeur/Fgt.h5",
  "sacre_coeur/Egt.h5",
  "sacre_coeur/K1_K2.h5",
  "sacre_coeur/R.h5",
  "sacre_coeur/T.h5",
  "st_peters_square/matches.h5",
  "st_peters_square/match_conf.h5",
  "st_peters_square/Fgt.h5",
  "st_peters_square/Egt.h5",
  "st_peters_square/K1_K2.h5",
  "st_peters_square/R.h5",
  "st_peters_square/T.h5",
]
ground_truth = "Fgt.h5"

[[dataset]]
id = "phototourism-val-images-webp-q85"
archive = "phototourism-val-images-webp-q85-v1.tar.zst"
files = ["sacre_coeur/images/*.webp", "st_peters_square/images/*.webp"]
ground_truth = "not applicable: visual-inspection artifact only"

[[dataset]]
id = "homography/sacre_coeur"
files = ["homography_sacre_coeur_a.jpg", "homography_sacre_coeur_b.jpg"]
ground_truth = "pending: correspondence and homography ground truth"

[[dataset]]
id = "absolute_pose/pose6dscene"
files = ["pose6dscene.K", "pose6dscene_gt.txt", "pose6dscene_points.txt"]
ground_truth = "pose6dscene_gt.txt"

[[dataset]]
id = "rigid_transform/example"
files = ["rigid_pose_example_gt.txt", "rigid_pose_example_points.txt"]
ground_truth = "rigid_pose_example_gt.txt"
